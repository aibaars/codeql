name: "C++: GIT"

on: [push]

jobs:
  build:

    strategy:
      fail-fast: false

    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v1
      with:
        submodules: recursive

    - name: OSX deps
      if: matrix.os == 'macOS-latest'
      run: |
         brew install autoconf automake

    - name: Configure
      run: |
        cd repos/git
        make configure
        sh ./configure
    - uses: ./codeql-setup
      with: 
        tools: ${{ secrets.CODEQL_CLI_URL }}
        language: cpp
    - name: Build with Make
      run: |
        cd repos/git
        make libgit.a
    - uses: ./codeql-main
