name: CodeQL with post script

on:
  pull_request: 
  push:
    branches-ignore:
      - 'separate_workflow'

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v1
    - name: CodeQL
      uses: ./codeql
      with:
        tools: ${{ secrets.CODEQL_CLI_URL }}
        language: cpp
    - name: Run build
      run: |
         gcc -c main.c
