name: CodeQL with post script

on: 
  pull_request: 
  push:

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v1
    - name: CodeQL
      uses: ./codeql
      with:
        tools: ${{ secrets.CODEQL_CLI_URL }}
        language: cpp
    - name: Run build
      run: |
         echo "int main() {return 1;}" > main.c 
         gcc -c main.c
    - uses: actions/upload-artifact@master
      with:
        name: database
        path: database

