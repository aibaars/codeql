name: CodeQL end-to-end analysis

on: [push]

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v1
    - name: analysis
      uses: ./codeql-self-contained
      with:
        language: cpp
        tools: ${{ secrets.CODEQL_URL }}
        license: ${{ secrets.CODEQL_LICENSE_URL }}
    - uses: actions/upload-artifact@master
      with:
        name: snapshot
        path: project