name: "Javascript: amazon-cognito"

on:
  push:
    branches-ignore:
      - 'separate_workflow'

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v1
      with:
        submodules: recursive
    - uses: ./codeql-setup
      with: 
        tools: ${{ secrets.CODEQL_CLI_URL }}
        language: javascript
    - uses: ./codeql-main
      #working-directory: repos/amazon-cognito-js
