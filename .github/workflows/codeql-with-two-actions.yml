name: CodeQL as two separate actions

on: [push]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v1
    - name: Init tracer
      uses: ./codeql-setup
      with:
        tools: ${{ secrets.CODEQL_URL }}
        license: ${{ secrets.CODEQL_LICENSE_URL }}
    - name: Run build
      run: |
         echo "int main() {return 1;}" > main.c 
         gcc -c main.c
    - name: Finalize database
      uses: ./codeql-main
    - uses: actions/upload-artifact@master
      with:
        name: snapshot
        path: project

