name: CodeQL as two separate actions

on:
  push:
    branches-ignore:
      - 'separate_workflow'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macOS-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v1
    - name: Init tracer
      uses: ./codeql-setup
      with:
        tools: ${{ secrets.CODEQL_URL }}
        license: ${{ secrets.CODEQL_LICENSE_URL }}
    - name: Copy bash to SIP free area for OSX
      if: matrix.os == 'macOS-latest'
      run: |
         cp /bin/bash /usr/local/bin/
    - name: Run build
      run: |
         gcc -c main.c
    - name: Finalize database
      uses: ./codeql-main
    - uses: actions/upload-artifact@master
      with:
        name: snapshot
        path: project

