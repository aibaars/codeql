name: "Test typescript-action"
on:
  pull_request:
  push:

jobs:
  test:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v1
    - uses: actions/setup-go@v2
      with:
         go-version: '^1.13.1'
    - run: |
        wget -q https://github.com/Anthophila/codeql-action/releases/download/codeql-bundle-20200423/codeql-bundle.zip -O codeql.zip
        unzip -q codeql.zip
        go build main.go
        codeql/codeql database create out --language=cpp --command='./main'

