name: "C#: SmartSql"

on: [push]

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ macOS-latest ]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v1
      with:
        submodules: recursive
#    - name: Copy bash to SIP free area for OSX
#      if: matrix.os == 'macOS-latest'
#      run: |
#         cp /bin/bash /usr/local/bin/
    - uses: ./codeql-setup
      with: 
        tools: ${{ secrets.CODEQL_CLI_URL }}
        language: csharp
    - name: Build SmartSql with dotnet
      run: |
        export DOTNET_CLI_TELEMETRY_OPTOUT=1
        export SEMMLE_CLRTRACER_CONSOLE=1
        export SEMMLE_CLRTRACER_VERBOSITY=3
        export SEMMLE_DEBUG_TRACER=10000
        cd repos/SmartSql
        dotnet build SmartSql.sln &
        PID=$!
        sleep 120
        lsof -p $PID
        find ../../../database -type f
        cat  ../../../database/log/build-tracer.log
        kill -9 $PID
    - uses: ./codeql-main
