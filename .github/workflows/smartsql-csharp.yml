name: "C#: SmartSql"

on: [push]

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest] # dotnet process hangs on macOS-latest

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v1
      with:
        submodules: recursive
    - name: Copy bash to SIP free area for OSX
      if: matrix.os == 'macOS-latest'
      run: |
         cp /bin/bash /usr/local/bin/
    - uses: ./codeql-setup
      with: 
        tools: ${{ secrets.CODEQL_CLI_URL }}
        language: csharp
    - name: Build SmartSql with dotnet
      run: |
        cd repos/SmartSql
        dotnet build SmartSql.sln
    - uses: ./codeql-main
